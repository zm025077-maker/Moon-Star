<!DOCTYPE html>
<html>
<head>
<title>Zubair Online Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* Header */

header{
background:#ff6600;
color:white;
text-align:center;
padding:15px;
}

header img{
width:70px;
border-radius:50%;
}

/* Menu */

nav{
background:#222;
text-align:center;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 20px;
cursor:pointer;
font-size:16px;
}

nav button:hover{
background:#ff6600;
}

/* Search */

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:80%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

/* Products */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#ff6600;
font-size:18px;
}

button.order{
background:#25D366;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

/* Footer */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>

<img src="YOURPHOTO.jpg">

<h2>Zubair Online Store</h2>

</header>

<nav>

<button onclick="showCategory('all')">Home</button>
<button onclick="showCategory('fan')">Fans</button>
<button onclick="showCategory('heater')">Heaters</button>
<button onclick="showCategory('mobile')">Mobile Accessories</button>
<button onclick="showCategory('watch')">Watches</button>

</nav>

<div class="search-box">

<input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">

</div>

<div class="products" id="products"></div>

<footer>

© 2026 Zubair Store

</footer>

<script>

let products=[

{name:"Ceiling Fan",price:"Rs 3500",cat:"fan",img:"https://source.unsplash.com/200x200/?ceiling-fan"},
{name:"Table Fan",price:"Rs 2500",cat:"fan",img:"https://source.unsplash.com/200x200/?table-fan"},
{name:"Wall Fan",price:"Rs 3000",cat:"fan",img:"https://source.unsplash.com/200x200/?wall-fan"},
{name:"Room Heater",price:"Rs 4200",cat:"heater",img:"https://source.unsplash.com/200x200/?heater"},
{name:"Electric Heater",price:"Rs 3800",cat:"heater",img:"https://source.unsplash.com/200x200/?electric-heater"},
{name:"Smart Watch",price:"Rs 2500",cat:"watch",img:"https://source.unsplash.com/200x200/?smartwatch"},
{name:"Digital Watch",price:"Rs 1800",cat:"watch",img:"https://source.unsplash.com/200x200/?watch"},
{name:"Mobile Cover",price:"Rs 500",cat:"mobile",img:"https://source.unsplash.com/200x200/?phone-case"},
{name:"Phone Pouch",price:"Rs 600",cat:"mobile",img:"https://source.unsplash.com/200x200/?phone-pouch"},
{name:"Wireless Earbuds",price:"Rs 2200",cat:"mobile",img:"https://source.unsplash.com/200x200/?earbuds"},
{name:"Bluetooth Speaker",price:"Rs 3000",cat:"mobile",img:"https://source.unsplash.com/200x200/?speaker"},
{name:"Power Bank",price:"Rs 2000",cat:"mobile",img:"https://source.unsplash.com/200x200/?power-bank"},
{name:"USB Cable",price:"Rs 300",cat:"mobile",img:"https://source.unsplash.com/200x200/?usb-cable"},
{name:"Phone Charger",price:"Rs 900",cat:"mobile",img:"https://source.unsplash.com/200x200/?phone-charger"},
{name:"LED Bulb",price:"Rs 400",cat:"electronic",img:"https://source.unsplash.com/200x200/?led-bulb"},
{name:"Desk Lamp",price:"Rs 1200",cat:"electronic",img:"https://source.unsplash.com/200x200/?lamp"},
{name:"Tripod Stand",price:"Rs 1500",cat:"electronic",img:"https://source.unsplash.com/200x200/?tripod"},
{name:"Ring Light",price:"Rs 2000",cat:"electronic",img:"https://source.unsplash.com/200x200/?ring-light"},
{name:"Keyboard",price:"Rs 1800",cat:"electronic",img:"https://source.unsplash.com/200x200/?keyboard"},
{name:"Wireless Mouse",price:"Rs 1200",cat:"electronic",img:"https://source.unsplash.com/200x200/?mouse"}

];

let container=document.getElementById("products");

function showProducts(list){

container.innerHTML="";

list.forEach(p=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>

<a href="https://wa.me/923482009136">

<button class="order">Order on WhatsApp</button>

</a>

`;

container.appendChild(card);

});

}

showProducts(products);

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let filtered=products.filter(p=>p.name.toLowerCase().includes(input));

showProducts(filtered);

}

function showCategory(cat){

if(cat=="all"){

showProducts(products);

}else{

let filtered=products.filter(p=>p.cat==cat);

showProducts(filtered);

}

}

</script>

</body>
</html>
