<!DOCTYPE html>
<html>
<head>

<title>Zubair Online Store</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0a7cff;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#333;
text-align:center;
padding:10px;
}

nav button{
background:#555;
color:white;
border:none;
padding:10px;
margin:5px;
cursor:pointer;
}

.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:80%;
max-width:400px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px #ccc;
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.price{
color:red;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
}

button{
padding:8px 12px;
margin:5px;
border:none;
cursor:pointer;
}

.cartbtn{
background:orange;
color:white;
}

.orderbtn{
background:#25d366;
color:white;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>Zubair Online Store</h1>

</header>

<nav>

<button onclick="filterCat('all')">All</button>
<button onclick="filterCat('fan')">Fans</button>
<button onclick="filterCat('heater')">Heaters</button>
<button onclick="filterCat('watch')">Watches</button>
<button onclick="filterCat('mobile')">Mobile</button>

</nav>

<div class="search">

<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">

</div>

<div class="products" id="products"></div>

<footer>

<h3>Contact</h3>

<p>Email: zubair@gmail.com</p>

<p>JazzCash: 03067098162</p>

<p>EasyPaisa: 03482009136</p>

</footer>

<script>

let products=JSON.parse(localStorage.getItem("products")) || []

let container=document.getElementById("products")

function showProducts(list){

container.innerHTML=""

list.forEach((p,i)=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<img src="${p.image}" style="width:100%;height:160px;object-fit:cover;">
<h3>${p.name}</h3>

<p class="price">Rs ${p.price}</p>

<p class="old">Rs ${p.oldPrice}</p>

<button class="cartbtn">Add to Cart</button>

<a href="https://wa.me/923067098162">

<button class="orderbtn">WhatsApp Order</button>

</a>

`

container.appendChild(div)

})

}

showProducts(products)

function searchProduct(){

let value=document.getElementById("search").value.toLowerCase()

let filtered=products.filter(p=>p.name.toLowerCase().includes(value))

showProducts(filtered)

}

function filterCat(cat){

if(cat=="all"){

showProducts(products)

}else{

let filtered=products.filter(p=>p.cat==cat)

showProducts(filtered)

}

}

</script>

</body>

</html>
