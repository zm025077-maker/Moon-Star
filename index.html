88<!DOCTYPE html>
<html>
<head>
<title>Zubair Online Store</title>

<style>
body{
margin:0;
padding:0;
}
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
}

.cart{
position:absolute;
right:20px;
top:20px;
background:red;
color:white;
padding:5px 10px;
border-radius:5px;
}

.container{
padding:20px;
}

form input,form select{
padding:10px;
margin:5px;
}

button{
padding:8px;
cursor:pointer;
margin-top:5px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:10px;
border-radius:5px;
box-shadow:0 0 5px #ccc;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.price{
color:green;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:red;
}

</style>

</head>

<body>

<header>

<h1>Zubair Online Store</h1>

<div class="cart">
Cart: <span id="cartCount">0</span>
</div>

</header>

<div class="container">

<h2>Add Product</h2>

<form id="productForm">

<input type="text" id="name" placeholder="Product Name" required>

<input type="number" id="price" placeholder="Price" required>

<input type="number" id="oldPrice" placeholder="Old Price">

<input type="text" id="image" placeholder="Image URL" required>

<select id="cat">

<option value="mobile">Mobile</option>
<option value="laptop">Laptop</option>
<option value="watch">Watch</option>

</select>

<button type="submit">Add Product</button>

</form>

<br>

<input type="text" id="search" placeholder="Search product" onkeyup="searchProduct()">

<select onchange="filterCat(this.value)">
<option value="all">All</option>
<option value="mobile">Mobile</option>
<option value="laptop">Laptop</option>
<option value="watch">Watch</option>
</select>

<div class="products" id="products"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || []
let cart = JSON.parse(localStorage.getItem("cart")) || []

let container = document.getElementById("products")

updateCart()

document.getElementById("productForm").onsubmit=function(e){

e.preventDefault()

let newProduct={

name:document.getElementById("name").value,
price:document.getElementById("price").value,
oldPrice:document.getElementById("oldPrice").value,
image:document.getElementById("image").value,
cat:document.getElementById("cat").value

}

products.push(newProduct)

localStorage.setItem("products",JSON.stringify(products))

showProducts(products)

this.reset()

}

function showProducts(list){

container.innerHTML=""

list.forEach((p,i)=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<img src="${p.image}">

<h3>${p.name}</h3>

<p class="price">Rs ${p.price}</p>

${p.oldPrice ? `<p class="old">Rs ${p.oldPrice}</p>` : ""}

<button onclick="addToCart(${i})">Add To Cart</button>

<button onclick="deleteProduct(${i})" style="background:red;color:white;">Delete</button>

<a href="https://wa.me/923067098162?text=I want to order ${p.name}">
<button style="background:green;color:white;">WhatsApp Order</button>
</a>

`

container.appendChild(div)

})

}

function deleteProduct(index){

products.splice(index,1)

localStorage.setItem("products",JSON.stringify(products))

showProducts(products)

}

function addToCart(index){

cart.push(products[index])

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

alert("Product added to cart")

}

function updateCart(){

document.getElementById("cartCount").innerText=cart.length

}

function searchProduct(){

let value=document.getElementById("search").value.toLowerCase()

let filtered=products.filter(p=>p.name.toLowerCase().includes(value))

showProducts(filtered)

}

function filterCat(cat){

if(cat=="all"){

showProducts(products)

}else{

let filtered=products.filter(p=>p.cat==cat)

showProducts(filtered)

}

}

showProducts(products)

</script>
</body>
</html>
