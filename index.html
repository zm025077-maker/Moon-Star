<!DOCTYPE html>
<html>
<head>
<title>Zubair Online Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* Header */

header{
background:#ff6600;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

/* Menu */

nav{
background:#222;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:white;
padding:12px 20px;
text-decoration:none;
}

nav a:hover{
background:#ff6600;
}

/* Banner */

.banner{
background:url("https://via.placeholder.com/1200x300");
height:250px;
background-size:cover;
background-position:center;
}

/* Search */

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:80%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

/* Products */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#ff6600;
font-size:18px;
margin:5px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

/* Footer */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
Zubair Online Store
</header>

<nav>
<a href="#">Home</a>
<a href="#">Mobiles</a>
<a href="#">Accessories</a>
<a href="#">Deals</a>
<a href="#">Contact</a>
</nav>

<div class="banner"></div>

<div class="search-box">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>

<div class="products" id="products"></div>

<footer>
© 2026 Zubair Store | All Rights Reserved
</footer>

<script>

/* 50 Products */

let products = [
"Smart Watch","Mobile Cover","Wireless Earbuds","Bluetooth Speaker","Power Bank",
"Phone Charger","USB Cable","Gaming Mouse","Laptop Bag","Headphones",
"LED Ring Light","Tripod Stand","Memory Card","USB Flash Drive","Phone Stand",
"Keyboard","Gaming Headset","Smart Band","Mini Camera","Wireless Charger",
"Car Mobile Holder","Portable Fan","LED Lamp","Tablet Cover","Laptop Stand",
"Phone Grip","Wireless Mouse","Bluetooth Keyboard","Desk Lamp","HDMI Cable",
"Screen Protector","Microphone","Gaming Controller","Drone Toy","Smart Bulb",
"Digital Clock","Fitness Tracker","Camera Lens","Phone Cooling Fan","VR Glasses",
"WiFi Router","USB Hub","Mini Speaker","LED Strip Light","Phone Case Premium",
"Selfie Stick","Laptop Cooling Pad","Portable SSD","Gaming Pad","Tablet Stand"
];

let container = document.getElementById("products");

products.forEach(function(item){

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="https://via.placeholder.com/200">
<h3>${item}</h3>
<p class="price">$10</p>
<a href="https://wa.me/923482009136">
<button>Order on WhatsApp</button>
</a>
`;

container.appendChild(card);

});

/* Search */

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(function(card){

let title=card.querySelector("h3").innerText.toLowerCase();

if(title.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
