<!DOCTYPE html>
<html>
<head>

<title>Zubair Online Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#ff6600;
color:white;
text-align:center;
padding:15px;
font-size:24px;
}

nav{
background:#222;
text-align:center;
}

nav button{
background:none;
border:none;
color:white;
padding:14px 20px;
font-size:16px;
cursor:pointer;
}

nav button:hover{
background:#ff6600;
}

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:80%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#ff6600;
font-size:18px;
}

.order{
background:#25D366;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>

Zubair Online Store

</header>

<nav>

<button onclick="showCategory('all')">Home</button>
<button onclick="showCategory('fan')">Fans</button>
<button onclick="showCategory('heater')">Heaters</button>
<button onclick="showCategory('mobile')">Mobile Accessories</button>
<button onclick="showCategory('watch')">Watches</button>

</nav>

<div class="search-box">

<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">

</div>

<div class="products" id="products"></div>

<footer>

© 2026 Zubair Store

</footer>

<script>

let products=[

{name:"Ceiling Fan",price:"Rs 3500",cat:"fan",img:"https://loremflickr.com/300/300/fan"},
{name:"Table Fan",price:"Rs 2500",cat:"fan",img:"https://loremflickr.com/300/300/tablefan"},
{name:"Wall Fan",price:"Rs 3000",cat:"fan",img:"https://loremflickr.com/300/300/wallfan"},

{name:"Room Heater",price:"Rs 4200",cat:"heater",img:"https://loremflickr.com/300/300/heater"},
{name:"Electric Heater",price:"Rs 3800",cat:"heater",img:"https://loremflickr.com/300/300/electricheater"},

{name:"Smart Watch",price:"Rs 2500",cat:"watch",img:"https://loremflickr.com/300/300/smartwatch"},
{name:"Digital Watch",price:"Rs 1800",cat:"watch",img:"https://loremflickr.com/300/300/watch"},

{name:"Mobile Cover",price:"Rs 500",cat:"mobile",img:"https://loremflickr.com/300/300/phonecase"},
{name:"Phone Pouch",price:"Rs 600",cat:"mobile",img:"https://loremflickr.com/300/300/phonepouch"},
{name:"Wireless Earbuds",price:"Rs 2200",cat:"mobile",img:"https://loremflickr.com/300/300/earbuds"},
{name:"Bluetooth Speaker",price:"Rs 3000",cat:"mobile",img:"https://loremflickr.com/300/300/speaker"},
{name:"Power Bank",price:"Rs 2000",cat:"mobile",img:"https://loremflickr.com/300/300/powerbank"},
{name:"USB Cable",price:"Rs 300",cat:"mobile",img:"https://loremflickr.com/300/300/usbcable"},
{name:"Phone Charger",price:"Rs 900",cat:"mobile",img:"https://loremflickr.com/300/300/charger"},

{name:"LED Bulb",price:"Rs 400",cat:"electronic",img:"https://loremflickr.com/300/300/bulb"},
{name:"Desk Lamp",price:"Rs 1200",cat:"electronic",img:"https://loremflickr.com/300/300/lamp"},
{name:"Tripod Stand",price:"Rs 1500",cat:"electronic",img:"https://loremflickr.com/300/300/tripod"},
{name:"Ring Light",price:"Rs 2000",cat:"electronic",img:"https://loremflickr.com/300/300/ringlight"},
{name:"Keyboard",price:"Rs 1800",cat:"electronic",img:"https://loremflickr.com/300/300/keyboard"},
{name:"Wireless Mouse",price:"Rs 1200",cat:"electronic",img:"https://loremflickr.com/300/300/mouse"}

];

let container=document.getElementById("products");

function showProducts(list){

container.innerHTML="";

list.forEach(function(p){

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>

<a href="https://wa.me/923482009136">

<button class="order">Order on WhatsApp</button>

</a>

`;

container.appendChild(card);

});

}

showProducts(products);

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let filtered=products.filter(p=>p.name.toLowerCase().includes(input));

showProducts(filtered);

}

function showCategory(cat){

if(cat=="all"){

showProducts(products);

}else{

let filtered=products.filter(p=>p.cat==cat);

showProducts(filtered);

}

}

</script>

</body>

</html>
