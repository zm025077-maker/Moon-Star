<!DOCTYPE html>
<html>
<head>
<title>Zubair Store</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
padding:15px;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:green;
font-size:18px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>
</head>

<body>

<header>
Zubair Online Store
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smart Watch</h3>
<p class="price">$20</p>

<a href="https://wa.me/923482009136">
<button>Order on WhatsApp</button>
</a>

</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mobile Cover</h3>
<p class="price">$5</p>

<a href="https://wa.me/923482009136">
<button>Order on WhatsApp</button>
</a>

</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Wireless Earbuds</h3>
<p class="price">$15</p>

<a href="https://wa.me/923482009136">
<button>Order on WhatsApp</button>
</a>

</div>

</div>

<footer>
© 2026 Zubair Store | All Rights Reserved
</footer>

</body>
</html>
