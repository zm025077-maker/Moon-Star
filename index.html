<!DOCTYPE html>
<html>
<head>
<title>Zubair Online Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff6600;
color:white;
padding:15px;
text-align:center;
font-size:24px;
}

nav{
background:#222;
text-align:center;
}

nav a{
color:white;
padding:12px 20px;
display:inline-block;
text-decoration:none;
}

nav a:hover{
background:#ff6600;
}

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
width:80%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#ff6600;
font-size:18px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>Zubair Online Store</header>

<nav>
<a href="#">Home</a>
<a href="#">Mobiles</a>
<a href="#">Accessories</a>
<a href="#">Contact</a>
</nav>

<div class="search-box">
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div class="products" id="products"></div>

<footer>
© 2026 Zubair Store
</footer>

<script>

let products = [

{name:"Smart Watch",img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
{name:"Mobile Cover",img:"https://images.unsplash.com/photo-1603313011108-d0e2c9c8b87b"},
{name:"Wireless Earbuds",img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad"},
{name:"Bluetooth Speaker",img:"https://images.unsplash.com/photo-1589003077984-894e133dabab"},
{name:"Power Bank",img:"https://images.unsplash.com/photo-1580894908361-967195033215"},
{name:"Phone Charger",img:"https://images.unsplash.com/photo-1586953208448-b95a79798f07"},
{name:"Gaming Mouse",img:"https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7"},
{name:"Headphones",img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e"},
{name:"Laptop Bag",img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad"},
{name:"USB Cable",img:"https://images.unsplash.com/photo-1611175694986-8d0d2b96f8a4"}

];

let container=document.getElementById("products");

products.forEach(function(p){

let card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">$10</p>

<a href="https://wa.me/923482009136">
<button>Order on WhatsApp</button>
</a>

`;

container.appendChild(card);

});

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(function(card){

let title=card.querySelector("h3").innerText.toLowerCase();

if(title.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
